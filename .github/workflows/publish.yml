name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pypi:
    name: Build and publish
    runs-on: self-hosted
    timeout-minutes: 90
    env:
      UV_CACHE_DIR: /tmp/uv-cache
      UV_LINK_MODE: copy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Configure CUDA
        run: |
          echo "CUDA_HOME=/usr/local/cuda-12.8" >> "$GITHUB_ENV"
          echo "/usr/local/cuda-12.8/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Build source distribution
        run: |
          rm -rf dist
          uv run --dev python -m build --sdist --outdir dist

      - name: Check distributions
        run: uv run --dev twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
